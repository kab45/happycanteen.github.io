
<html>
  <body>
    <script src="hls.js"></script>

    <center>
      <video id="video" controls autoplay muted></video>
      <br>
      <button onclick="switchTop()">top view</button>
      <button onclick="switchBack()">back view</button>
      <button onclick="switchFront()">front view</button>
      <br>
      <p>dm kab43 if theres issues</p>
    </center>

    <script>
      var video = document.getElementById('video');
      if (Hls.isSupported()) {
        var hls = new Hls({
          debug: true,
        });
        hls.loadSource('hellobike/streetcatpull/live/4258783365322591678_0.m3u8');
        hls.attachMedia(video);
        hls.on(Hls.Events.MEDIA_ATTACHED, function () {
          video.muted = true;
          video.play();
        });
      }
      // hls.js is not supported on platforms that do not have Media Source Extensions (MSE) enabled.
      // When the browser has built-in HLS support (check using `canPlayType`), we can provide an HLS manifest (i.e. .m3u8 URL) directly to the video element through the `src` property.
      // This is using the built-in support of the plain video element, without using hls.js.
      else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = 'hellobike/streetcatpull/live/4258783365322591678_0.m3u8';
        video.addEventListener('canplay', function () {
          video.play();
        });
      }
      // button switch part
      function switchTop() {
       hls.loadSource('hellobike/streetcatpull/live/4258783365322591678_1.m3u8') // top view
      }
      function switchBack() {
       hls.loadSource('hellobike/streetcatpull/live/4258783365322591678_2.m3u8') // back view
      }
      function switchFront() {
       hls.loadSource('hellobike/streetcatpull/live/4258783365322591678_0.m3u8') // front view
      }
    </script>
 </body>
</html>
